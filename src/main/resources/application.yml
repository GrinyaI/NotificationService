spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:notifications_database}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      group-id: notification-group
      auto-offset-reset: earliest
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      time-to-live: 600000

kafka:
  topic:
    email: notifications.email
    sms: notifications.sms
    push: notifications.push
    partitions: 3
    replicas: 1
  consumer:
    group:
      email: notifications-email-group
      sms: notifications-sms-group
      push: notifications-push-group
    retry:
      backoff-ms: 2000
      max-attempts: 2

notification:
  archive:
    cron: "${NOTIFICATION_ARCHIVE_CRON:0 0 3 * * ?}"
    retention-days: ${NOTIFICATION_ARCHIVE_RETENTION_DAYS:30}
  outbox:
    publish-delay-ms: 1000
    initial-delay-ms: 0
    max-attempts: 3
    send-timeout-seconds: 5
    batch-size: 50
    processing-timeout-seconds: 60
  sms:
    provider: ${SMS_PROVIDER:SIMULATED}
    exolve:
      api-key: ${EXOLVE_API_KEY:}
      base-url: ${EXOLVE_BASE_URL:https://api.exolve.ru}
      sender-number: ${EXOLVE_SENDER_NUMBER:}
  email:
    provider: ${EMAIL_PROVIDER:SIMULATED}
    yandex-smtp:
      host: ${YANDEX_SMTP_HOST:smtp.yandex.ru}
      port: ${YANDEX_SMTP_PORT:465}
      username: ${YANDEX_SMTP_USERNAME:}
      password: ${YANDEX_SMTP_PASSWORD:}
      from: ${YANDEX_SMTP_FROM:}
      subject: ${YANDEX_SMTP_SUBJECT:NotificationService notification}
      ssl-enabled: ${YANDEX_SMTP_SSL_ENABLED:true}
      starttls-enabled: ${YANDEX_SMTP_STARTTLS_ENABLED:false}
      connection-timeout-ms: ${YANDEX_SMTP_CONNECTION_TIMEOUT_MS:10000}
      timeout-ms: ${YANDEX_SMTP_TIMEOUT_MS:10000}
      write-timeout-ms: ${YANDEX_SMTP_WRITE_TIMEOUT_MS:10000}

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    root: INFO
    com.example.notifications: TRACE
