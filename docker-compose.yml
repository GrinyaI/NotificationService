services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-notifications_database}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-notifications_database}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: "2181"
      ZOOKEEPER_TICK_TIME: "2000"
    healthcheck:
      test: [ "CMD-SHELL", "echo srvr | nc localhost 2181 | grep -q Zookeeper" ]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: "1"
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:${KAFKA_EXTERNAL_PORT:-9092}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false'
    ports:
      - "${KAFKA_EXTERNAL_PORT:-9092}:9092"
    healthcheck:
      test: [ "CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:29092 >/dev/null 2>&1" ]
      interval: 10s
      timeout: 15s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  notification-service:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-notifications_database}
      DB_USER: ${DB_USER:-postgres}
      DB_PASS: ${DB_PASS:-postgres}
      KAFKA_BOOTSTRAP: kafka:29092
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      SERVER_PORT: "8080"
      JAVA_OPTS: ${JAVA_OPTS:--XX:MaxRAMPercentage=75.0}
      SMS_PROVIDER: ${SMS_PROVIDER:-SIMULATED}
      EXOLVE_API_KEY: ${EXOLVE_API_KEY:-}
      EXOLVE_BASE_URL: ${EXOLVE_BASE_URL:-https://api.exolve.ru}
      EXOLVE_SENDER_NUMBER: ${EXOLVE_SENDER_NUMBER:-}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-SIMULATED}
      YANDEX_SMTP_HOST: ${YANDEX_SMTP_HOST:-smtp.yandex.ru}
      YANDEX_SMTP_PORT: ${YANDEX_SMTP_PORT:-465}
      YANDEX_SMTP_USERNAME: ${YANDEX_SMTP_USERNAME:-}
      YANDEX_SMTP_PASSWORD: ${YANDEX_SMTP_PASSWORD:-}
      YANDEX_SMTP_FROM: ${YANDEX_SMTP_FROM:-}
      YANDEX_SMTP_SUBJECT: ${YANDEX_SMTP_SUBJECT:-NotificationService notification}
      YANDEX_SMTP_SSL_ENABLED: ${YANDEX_SMTP_SSL_ENABLED:-true}
      YANDEX_SMTP_STARTTLS_ENABLED: ${YANDEX_SMTP_STARTTLS_ENABLED:-false}
      YANDEX_SMTP_CONNECTION_TIMEOUT_MS: ${YANDEX_SMTP_CONNECTION_TIMEOUT_MS:-10000}
      YANDEX_SMTP_TIMEOUT_MS: ${YANDEX_SMTP_TIMEOUT_MS:-10000}
      YANDEX_SMTP_WRITE_TIMEOUT_MS: ${YANDEX_SMTP_WRITE_TIMEOUT_MS:-10000}
      PUSH_PROVIDER: ${PUSH_PROVIDER:-SIMULATED}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      FIREBASE_CREDENTIALS_PATH: ${FIREBASE_CREDENTIALS_PATH:-}
      FIREBASE_CREDENTIALS_BASE64: ${FIREBASE_CREDENTIALS_BASE64:-}
      FIREBASE_PUSH_DEFAULT_TITLE: ${FIREBASE_PUSH_DEFAULT_TITLE:-NotificationService}
      FRONTEND_ALLOWED_ORIGINS: ${FRONTEND_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8080}
      NOTIFICATION_ARCHIVE_CRON: "${NOTIFICATION_ARCHIVE_CRON:-0 0 3 * * ?}"
      NOTIFICATION_ARCHIVE_RETENTION_DAYS: ${NOTIFICATION_ARCHIVE_RETENTION_DAYS:-30}
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - ${FIREBASE_CREDENTIALS_HOST_PATH:-./secrets/firebase-service-account.json}:${FIREBASE_CREDENTIALS_PATH:-/run/secrets/firebase-service-account.json}:ro

volumes:
  pg_data:
  redis_data:
